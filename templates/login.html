<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Fleet Safety</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            min-height: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        .login-card .card-body {
            padding: 2.5rem;
        }
        .brand-icon {
            font-size: 3rem;
            line-height: 1;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #343a40;
        }
        .form-control {
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            border: 1px solid #dee2e6;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.2);
        }
        .form-control.is-invalid:focus {
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.2);
        }
        .input-group-text {
            background: #f8f9fa;
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #6c757d;
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 8px 8px 0;
        }
        .input-group .form-control:focus {
            border-left: none;
        }
        .btn-signin {
            padding: 0.65rem 1rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            border-radius: 8px;
        }
        .divider-text {
            font-size: 0.78rem;
            color: #adb5bd;
        }
        /* Subtle "secured by" badge at the bottom */
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            color: #6c757d;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div style="width: 100%; max-width: 420px; padding: 1rem;">
        <div class="card login-card">
            <div class="card-body">

                <!-- Brand -->
                <div class="text-center mb-4">
                    <div class="brand-icon">🚚</div>
                    <h4 class="fw-bold mt-2 mb-0">Fleet Safety</h4>
                    <p class="text-muted small mt-1 mb-0">Admin Portal — Authorized Access Only</p>
                </div>

                <!-- Error Alert -->
                {% if error %}
                <div class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3">
                    <i class="bi bi-shield-exclamation flex-shrink-0"></i>
                    <span class="small">{{ error }}</span>
                </div>
                {% endif %}

                <!-- Login Form -->
                <!--
                    NOTE: The form now collects BOTH a username and password.
                    These are checked against ADMIN_USERNAME and ADMIN_PASSWORD
                    in your .env file. Set them there — never hard-code credentials.
                -->
                <form method="POST" action="/admin/login" autocomplete="on" novalidate>

                    <!-- CSRF token: proves this form came from our own site -->
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <!-- Username Field -->
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input
                                type="text"
                                id="username"
                                name="username"
                                class="form-control {% if error %}is-invalid{% endif %}"
                                placeholder="Enter your admin username"
                                autofocus
                                autocomplete="username"
                                required
                            >
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-control {% if error %}is-invalid{% endif %}"
                                placeholder="Enter your admin password"
                                autocomplete="current-password"
                                required
                            >
                            <!-- Toggle password visibility button -->
                            <button
                                class="btn btn-outline-secondary"
                                type="button"
                                id="togglePassword"
                                title="Show/hide password"
                                style="border-left:none; border-radius: 0 8px 8px 0;"
                            >
                                <i class="bi bi-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                        {% if error %}
                        <div class="text-danger small mt-1">
                            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
                        </div>
                        {% endif %}
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-signin btn-lg">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                        </button>
                    </div>
                </form>

                <!-- Footer -->
                <div class="text-center mt-4">
                    <span class="security-badge">
                        <i class="bi bi-shield-lock-fill text-success"></i>
                        Session secured by Flask-Session
                    </span>
                    <p class="divider-text mt-3 mb-0">
                        Set credentials in <code>.env</code> as
                        <code>ADMIN_USERNAME</code> &amp; <code>ADMIN_PASSWORD</code>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle the password field between visible and hidden text.
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        toggleBtn.addEventListener('click', function () {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.classList.toggle('bi-eye', !isPassword);
            eyeIcon.classList.toggle('bi-eye-slash', isPassword);
        });
    </script>
</body>
</html>
